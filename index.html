<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>工程查驗與資料交付管理系統</title>
    <style>
        /* 日系簡約風格色彩計畫 */
        :root {
            --bg-neutral: #F7F5F0;       /* 溫潤中性色背景 */
            --bg-card: #FFFFFF;          /* 白卡片色 */
            --primary-teal: #1E4D56;     /* 深藍綠色 (主色調) */
            --primary-teal-light: #E9F2F3;/* 淺藍綠 (標籤、高亮) */
            --accent-orange: #D96C4A;    /* 橙色 (點綴、提醒) */
            --accent-orange-light: #FDF0EC;/* 淺橙色 */
            --text-main: #2C3E35;        /* 主要文字 */
            --text-muted: #7A8782;       /* 次要、備註文字 */
            --border-color: #E2DDD5;     /* 細線邊框色 */
            --border-focus: #1E4D56;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
        }

        html, body {
            background-color: var(--bg-neutral);
            color: var(--text-main);
            line-height: 1.6;
            font-size: 14px;
            overflow-x: hidden; /* 徹底防止手機版左右晃動、漏光 */
        }

        body {
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* 標題區頂部欄 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 {
            font-size: 20px;
            font-weight: 500;
            color: var(--primary-teal);
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        header h1::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background-color: var(--accent-orange);
        }

        .stats {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* 表單區塊 */
        .form-section {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .form-section h2 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 15px;
            color: var(--primary-teal);
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 8px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            align-items: end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 12px;
            font-weight: 500;
            color: var(--primary-teal);
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background-color: #FAFAFA;
            color: var(--text-main);
            font-size: 13px;
            outline: none;
            transition: all 0.2s ease;
        }

        input[type="text"]:focus, input[type="date"]:focus, select:focus {
            border-color: var(--border-focus);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 2px rgba(30, 77, 86, 0.1);
        }

        .checkbox-group-wrapper {
            grid-column: span 3;
            background: #FAFAFA;
            padding: 10px 15px;
            border-radius: 3px;
            border: 1px solid var(--border-color);
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            margin-top: 5px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            cursor: pointer;
        }

        .checkbox-label input {
            accent-color: var(--primary-teal);
            width: 15px;
            height: 15px;
        }

        /* 按鈕 */
        .btn-container {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 15px;
        }

        .btn {
            padding: 8px 20px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: background-color 0.2s;
        }

        .btn-primary { background-color: var(--primary-teal); color: white; }
        .btn-primary:hover { background-color: #15363D; }
        .btn-accent { background-color: var(--accent-orange); color: white; }
        .btn-accent:hover { background-color: #C05636; }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-secondary:hover { background-color: #EEE; }

        /* 資料表格區 */
        .table-wrapper {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow-x: auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            width: 100%;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            min-width: 1100px; /* 桌機版保持寬度不壓縮 */
        }

        th {
            background-color: #F0EDE6;
            color: var(--primary-teal);
            font-weight: 500;
            padding: 12px 10px;
            font-size: 12px;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 10px 10px;
            border-bottom: 1px solid var(--border-color);
            font-size: 13px;
            vertical-align: middle;
        }

        tr:hover { background-color: #FAF9F6; }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 500;
        }
        .badge-success { background-color: var(--primary-teal-light); color: var(--primary-teal); }
        .badge-warning { background-color: var(--accent-orange-light); color: var(--accent-orange); }

        .dot-active { color: var(--primary-teal); font-weight: bold; font-size: 14px; }
        .dot-inactive { color: #DDD; }
        .action-btns { display: flex; gap: 5px; }
        .btn-sm { padding: 3px 8px; font-size: 11px; border-radius: 2px; }

        /* 手機版 RWD */
        @media (max-width: 900px) {
            body { padding: 10px; }
            header { flex-direction: column; align-items: flex-start; gap: 5px; }
            .form-grid { grid-template-columns: 1fr; }
            .form-group.full-width, .checkbox-group-wrapper { grid-column: span 1; }
            .checkbox-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .table-wrapper { border: none; background-color: transparent; box-shadow: none; overflow-x: hidden; }
            table { min-width: auto !important; width: 100% !important; display: block; }
            thead { display: none; }
            tbody, tr, td { display: block; width: 100% !important; }
            tr { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 6px; margin-bottom: 15px; padding: 12px 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
            td { display: flex !important; justify-content: space-between !important; align-items: center; padding: 8px 0 !important; border-bottom: 1px dashed #F0EDE6 !important; text-align: right; background: none; }
            td:last-child { border-bottom: none !important; padding-top: 12px !important; justify-content: flex-end !important; }
            td::before { content: attr(data-label); font-weight: 500; color: var(--primary-teal); font-size: 12px; text-align: left; float: left; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>工程查驗與資料交付管理系統</h1>
            <p style="font-size: 12px; color: var(--text-muted); margin-top: 4px;">日系簡約工程記錄簿</p>
        </div>
        <div class="stats" id="statsCount">載入中...</div>
    </header>

    <div class="form-section">
        <h2 id="formTitle">新增查驗資料單元</h2>
        <form id="dataForm">
            <input type="hidden" id="editIndex" value="-1">
            <div class="form-grid">
                <div class="form-group">
                    <label for="unitName">查驗表 / 單元名稱</label>
                    <input type="text" id="unitName" placeholder="例如：第29單元 或 安全檢測..." required>
                </div>
                
                <div class="form-group">
                    <label for="progressStatus">完成進度</label>
                    <select id="progressStatus">
                        <option value="完成列印">完成列印</option>
                        <option value="未完成">未完成</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="checkDate">查驗日期</label>
                    <input type="date" id="checkDate">
                </div>

                <div class="form-group">
                    <label for="deliveryDate">資料交付日期</label>
                    <input type="date" id="deliveryDate">
                </div>

                <div class="form-group full-width">
                    <label for="remarks">備註欄位</label>
                    <input type="text" id="remarks" placeholder="輸入備註事項（如：監造自行製作、未通過原因等）">
                </div>

                <div class="checkbox-group-wrapper">
                    <label>檢驗項目狀態</label>
                    <div class="checkbox-grid">
                        <label class="checkbox-label"><input type="checkbox" id="chk1"> 特密管</label>
                        <label class="checkbox-label"><input type="checkbox" id="chk2"> 穩定液(澆置前)</label>
                        <label class="checkbox-label"><input type="checkbox" id="chk3"> 超音波</label>
                        <label class="checkbox-label"><input type="checkbox" id="chk4"> 鋼筋籠</label>
                        <label class="checkbox-label"><input type="checkbox" id="chk5"> 混凝土</label>
                        <label class="checkbox-label"><input type="checkbox" id="chk6"> 單項完成</label>
                    </div>
                </div>
            </div>

            <div class="btn-container">
                <button type="button" class="btn btn-secondary" onclick="resetForm()">重置清空</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">確認新增</button>
            </div>
        </form>
    </div>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>查驗表/單元</th>
                    <th style="text-align: center;">特密管</th>
                    <th style="text-align: center;">穩定液</th>
                    <th style="text-align: center;">超音波</th>
                    <th style="text-align: center;">鋼筋籠</th>
                    <th style="text-align: center;">混凝土</th>
                    <th style="text-align: center;">單項完成</th>
                    <th>完成進度</th>
                    <th>備註</th>
                    <th>查驗日期</th>
                    <th>資料交付</th>
                    <th style="text-align: center;">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  // 校正後的專屬 Firebase 鑰匙設定
  const firebaseConfig = {
    apiKey: "AIzaSyCv66pE4zBxas4QySrMeVyXXXhqbYg1llI",
    authDomain: "diaphragm-wall-61033.firebaseapp.com",
    projectId: "diaphragm-wall-61033",
    storageBucket: "diaphragm-wall-61033.firebasestorage.app", // 已修正儲存桶欄位
    messagingSenderId: "245135889935",
    appId: "1:245135889935:web:b590ed96b8ba879115b57a",
    measurementId: "G-4LTNHYWTG"
  };

  // 初始化
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const recordsCollection = collection(db, "engineering_records");

  const dataForm = document.getElementById('dataForm');
  const tableBody = document.getElementById('tableBody');
  const statsCount = document.getElementById('statsCount');
  const submitBtn = document.getElementById('submitBtn');

  let localCloudData = [];

  // 1. 【監聽雲端】即時同步兩端畫面
  const q = query(recordsCollection, orderBy("timestamp", "asc"));
  onSnapshot(q, (snapshot) => {
    tableBody.innerHTML = '';
    localCloudData = [];
    let completedCount = 0;

    snapshot.forEach((docSnap) => {
      const item = docSnap.data();
      const docId = docSnap.id;
      
      localCloudData.push({ id: docId, ...item });
      if (item.status === '完成列印') completedCount++;

      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td data-label="查驗表/單元" style="font-weight: 500; color: var(--primary-teal);">${item.name}</td>
        <td data-label="特密管">${item.chk1 ? '<span class="dot-active">✓</span>' : '<span class="dot-inactive">－</span>'}</td>
        <td data-label="穩定液">${item.chk2 ? '<span class="dot-active">✓</span>' : '<span class="dot-inactive">－</span>'}</td>
        <td data-label="超音波">${item.chk3 ? '<span class="dot-active">✓</span>' : '<span class="dot-inactive">－</span>'}</td>
        <td data-label="鋼筋籠">${item.chk4 ? '<span class="dot-active">✓</span>' : '<span class="dot-inactive">－</span>'}</td>
        <td data-label="混凝土">${item.chk5 ? '<span class="dot-active">✓</span>' : '<span class="dot-inactive">－</span>'}</td>
        <td data-label="單項完成">${item.chk6 ? '<span class="dot-active">✓</span>' : '<span class="dot-inactive">－</span>'}</td>
        <td data-label="完成進度"><span class="badge ${item.status === '完成列印' ? 'badge-success' : 'badge-warning'}">${item.status}</span></td>
        <td data-label="備註" style="color: var(--text-muted); font-size: 12px;">${item.remarks || '—'}</td>
        <td data-label="查驗日期">${item.checkDate || '—'}</td>
        <td data-label="資料交付">${item.deliveryDate || '—'}</td>
        <td data-label="操作">
            <div class="action-btns">
                <button type="button" class="btn btn-secondary btn-sm btn-edit" data-id="${docId}">編輯</button>
                <button type="button" class="btn btn-accent btn-sm btn-delete" style="background-color: #E2DDD5; color: #555;" data-id="${docId}" data-name="${item.name}">刪除</button>
            </div>
        </td>
      `;
      tableBody.appendChild(tr);
    });

    statsCount.innerHTML = `總計：<b>${localCloudData.length}</b> 筆 | 已完成：<span style="color: var(--primary-teal)"><b>${completedCount}</b></span> 筆 | 未完成：<span style="color: var(--accent-orange)"><b>${localCloudData.length - completedCount}</b></span> 筆`;
  }, (error) => {
      console.error("雲端監聽失敗:", error);
  });

  // 2. 【確認送出】新增或修改資料
  dataForm.addEventListener('submit', async function(e) {
    e.preventDefault();
    const editId = document.getElementById('editIndex').value;
    
    const itemData = {
      name: document.getElementById('unitName').value,
      chk1: document.getElementById('chk1').checked,
      chk2: document.getElementById('chk2').checked,
      chk3: document.getElementById('chk3').checked,
      chk4: document.getElementById('chk4').checked,
      chk5: document.getElementById('chk5').checked,
      chk6: document.getElementById('chk6').checked,
      status: document.getElementById('progressStatus').value,
      remarks: document.getElementById('remarks').value,
      checkDate: document.getElementById('checkDate').value,
      deliveryDate: document.getElementById('deliveryDate').value,
      timestamp: new Date()
    };

    try {
      if (editId === "-1") {
        await addDoc(recordsCollection, itemData);
      } else {
        const docRef = doc(db, "engineering_records", editId);
        await updateDoc(docRef, itemData);
      }
      resetForm();
    } catch (error) {
      alert("雲端同步失敗，請確認 Firebase 規則或欄位配置！");
      console.error(error);
    }
  });

  // 3. 【編輯與刪除監聽】
  document.addEventListener('click', async function(e) {
    if (e.target.classList.contains('btn-edit')) {
      const docId = e.target.getAttribute('data-id');
      const item = localCloudData.find(d => d.id === docId);
      if (!item) return;

      document.getElementById('editIndex').value = docId;
      document.getElementById('unitName').value = item.name;
      document.getElementById('chk1').checked = item.chk1;
      document.getElementById('chk2').checked = item.chk2;
      document.getElementById('chk3').checked = item.chk3;
      document.getElementById('chk4').checked = item.chk4;
      document.getElementById('chk5').checked = item.chk5;
      document.getElementById('chk6').checked = item.chk6;
      document.getElementById('progressStatus').value = item.status;
      document.getElementById('remarks').value = item.remarks;
      document.getElementById('checkDate').value = item.checkDate;
      document.getElementById('deliveryDate').value = item.deliveryDate;

      document.getElementById('formTitle').innerText = `編輯單元：${item.name}`;
      submitBtn.innerText = "儲存修改";
      submitBtn.className = "btn btn-accent";
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    if (e.target.classList.contains('btn-delete')) {
      const docId = e.target.getAttribute('data-id');
      const name = e.target.getAttribute('data-name');
      if (confirm(`確定要從雲端同步刪除「${name}」嗎？`)) {
        try {
          await deleteDoc(doc(db, "engineering_records", docId));
          if(document.getElementById('editIndex').value === docId) resetForm();
        } catch (error) {
          console.error("刪除失敗：", error);
        }
      }
    }
  });

  // 表單重置方法
  window.resetForm = function() {
    dataForm.reset();
    document.getElementById('editIndex').value = "-1";
    document.getElementById('formTitle').innerText = "新增查驗資料單元";
    submitBtn.innerText = "確認新增";
    submitBtn.className = "btn btn-primary";
  }
</script>
</body>
</html>
